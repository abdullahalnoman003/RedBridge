name: CI/CD - Vercel

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: vercel-cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app:
          - Client-Side
          - Server-Side
    defaults:
      run:
        working-directory: ${{ matrix.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Client-Side/package-lock.json
            Server-Side/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test --if-present

      - name: Build
        run: npm run build

  deploy_preview:
    name: Deploy Preview (PR)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client-Side
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client-Side/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate required Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_FRONTEND_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel Environment Information (Preview)
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Preview)
        id: deploy_preview
        run: |
          PREVIEW_URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "Preview URL: $PREVIEW_URL"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `✅ Preview deployment is ready: ${{ steps.deploy_preview.outputs.preview_url }}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Publish preview URL to summary
        run: |
          echo "### Preview Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy_preview.outputs.preview_url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy_preview_backend:
    name: Deploy Preview API (PR)
    if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server-Side
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Server-Side/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate required Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_BACKEND_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel Environment Information (Preview)
        run: npx vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: npx vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel API (Preview)
        id: deploy_preview_backend
        run: |
          PREVIEW_API_URL=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_api_url=$PREVIEW_API_URL" >> "$GITHUB_OUTPUT"
          echo "Preview API URL: $PREVIEW_API_URL"

      - name: Comment API preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const body = `✅ API preview deployment is ready: ${{ steps.deploy_preview_backend.outputs.preview_api_url }}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

      - name: Publish API preview URL to summary
        run: |
          echo "### Preview API Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy_preview_backend.outputs.preview_api_url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy_production:
    name: Deploy Production (main)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Client-Side
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Client-Side/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate required Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_FRONTEND_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel Environment Information (Production)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (Production)
        id: deploy_production
        run: |
          PROD_URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "prod_url=$PROD_URL" >> "$GITHUB_OUTPUT"
          echo "Production URL: $PROD_URL"

      - name: Publish production URL to summary
        run: |
          echo "### Production Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy_production.outputs.prod_url }}" >> "$GITHUB_STEP_SUMMARY"

  deploy_production_backend:
    name: Deploy Production API (main)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Server-Side
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Server-Side/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Validate required Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "Missing one or more required secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_BACKEND_PROJECT_ID"
            exit 1
          fi

      - name: Pull Vercel Environment Information (Production)
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: npx vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel API (Production)
        id: deploy_production_backend
        run: |
          PROD_API_URL=$(npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "prod_api_url=$PROD_API_URL" >> "$GITHUB_OUTPUT"
          echo "Production API URL: $PROD_API_URL"

      - name: Publish API production URL to summary
        run: |
          echo "### Production API Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.deploy_production_backend.outputs.prod_api_url }}" >> "$GITHUB_STEP_SUMMARY"
